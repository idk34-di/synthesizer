<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO-WEB — Pocket Operator gratuito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');
 
  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --surface2: #1a2330;
    --border: #1e3040;
    --accent: #5bc8e8;
    --accent2: #00ff88;
    --accent3: #ff6b6b;
    --text: #c8dce8;
    --text2: #4a7090;
    --screen-bg: #000d14;
    --screen-text: #00d4ff;
    --screen-dim: #003355;
    --pad: #5bc8e8;
    --pad-text: #001a28;
    --step-on: #5bc8e8;
    --step-off: #1a2330;
    --step-cur: #00ff88;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
 
  .logo {
    font-family: var(--font-mono);
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 3px;
  }
 
  .logo span { color: var(--accent2); }
 
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
 
  .rec-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    opacity: 0;
    transition: opacity .3s;
  }
  .rec-indicator.active { opacity: 1; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
 
  .header-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 2px;
  }
 
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
 
  /* ── DEVICE SELECTOR ── */
  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
 
  .tab {
    padding: 5px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    transition: all .15s;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { background: var(--accent); color: var(--pad-text); border-color: var(--accent); }
 
  /* ── DEVICE CARD ── */
  .device {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem;
  }
 
  /* ── SCREEN ── */
  .screen {
    background: var(--screen-bg);
    border: 1px solid #002233;
    border-radius: 3px;
    padding: 10px 14px;
    margin-bottom: 1.25rem;
    font-family: var(--font-mono);
  }
  .screen-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .screen-label { color: var(--screen-text); font-size: 11px; letter-spacing: 2px; }
  .screen-bpm { color: var(--screen-text); font-size: 24px; letter-spacing: 1px; }
  .screen-row { display: flex; gap: 16px; }
  .screen-info { color: var(--screen-dim); font-size: 10px; letter-spacing: 1px; }
  .screen-info.on { color: var(--screen-text); }
  .screen-info.rec-on { color: var(--accent3); }
 
  /* ── PADS ── */
  .pads-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1.25rem;
  }
 
  .pad {
    height: 62px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: var(--pad);
    color: var(--pad-text);
    transition: transform .07s, filter .07s;
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .pad:active, .pad.flash {
    transform: scale(.9);
    filter: brightness(1.5);
  }
  .pad.on::after {
    content: '';
    position: absolute;
    top: 6px; right: 6px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--pad-text);
    opacity: .5;
  }
  .pad-note { font-family: var(--font-mono); font-size: 13px; font-weight: bold; }
  .pad-sub { font-family: var(--font-mono); font-size: 9px; opacity: .6; }
 
  /* ── STEP SEQUENCER ── */
  .step-section { margin-bottom: 1rem; }
  .step-track-wrap { margin-bottom: 5px; }
  .step-track-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text2);
    letter-spacing: 1px;
    margin-bottom: 3px;
  }
  .step-row {
    display: grid;
    gap: 3px;
  }
  .step {
    height: 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--step-off);
    cursor: pointer;
    transition: background .08s;
  }
  .step.on { background: var(--step-on); border-color: var(--step-on); }
  .step.current { background: var(--step-cur); border-color: var(--step-cur); }
  .step.on.current { background: var(--step-cur); }
 
  /* ── CONTROLS ── */
  .controls-panel {
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    margin-top: .5rem;
  }
 
  .knobs-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
 
  .knob-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .knob {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: ns-resize;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    user-select: none;
  }
  .knob-dot {
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
    position: absolute;
    top: 4px;
    transform-origin: bottom center;
  }
  .knob-val {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
  }
  .knob-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text2);
    letter-spacing: 1px;
  }
 
  .fx-section { display: flex; flex-direction: column; gap: 5px; }
  .fx-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text2);
    letter-spacing: 1px;
  }
  .fx-chain { display: flex; gap: 5px; flex-wrap: wrap; }
  .fx-btn {
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid var(--accent);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    background: transparent;
    color: var(--accent);
    letter-spacing: 1px;
    transition: all .1s;
  }
  .fx-btn.active { background: var(--accent); color: var(--pad-text); }
 
  .btn-row {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 16px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .1s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: var(--pad-text); border-color: var(--accent); }
  .btn.rec { border-color: var(--accent3); color: var(--accent3); }
  .btn.rec.active { background: var(--accent3); color: #fff; }
  .btn.danger { border-color: var(--accent3); color: var(--accent3); }
  .btn.audio-rec { border-color: var(--accent2); color: var(--accent2); }
  .btn.audio-rec.active { background: var(--accent2); color: #001a10; }
 
  .tempo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: .75rem;
  }
  .tempo-row label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .tempo-row input[type=range] {
    flex: 1;
    accent-color: var(--accent);
  }
  .tempo-val {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    min-width: 60px;
    text-align: right;
  }
 
  .steps-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: .75rem;
  }
  .steps-row label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .steps-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 2px;
    cursor: pointer;
  }
 
  /* ── ADD SOUND PANEL ── */
  .add-sound-panel {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    margin-top: 1rem;
    background: var(--surface2);
  }
  .add-sound-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: .75rem;
  }
  .sound-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .sound-form input,
  .sound-form select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 2px;
    width: 100%;
  }
  .sound-form input::placeholder { color: var(--text2); }
  .form-full { grid-column: 1/-1; display: flex; gap: 8px; }
 
  /* ── MEMO SECTION ── */
  .memo-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
  }
  .memo-title {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 2px;
    margin-bottom: .75rem;
  }
  .memo-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .memo-list { margin-top: .75rem; display: flex; flex-direction: column; gap: 6px; }
  .memo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 12px;
  }
  .memo-name {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    flex: 1;
  }
  .memo-size {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
  }
  .btn-sm {
    padding: 4px 10px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    transition: all .1s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.danger:hover { border-color: var(--accent3); color: var(--accent3); }
 
  .audio-wave {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 16px;
  }
  .wave-bar {
    width: 3px;
    background: var(--accent3);
    border-radius: 1px;
    animation: wave .8s ease-in-out infinite;
  }
  .wave-bar:nth-child(2) { animation-delay: .1s; }
  .wave-bar:nth-child(3) { animation-delay: .2s; }
  .wave-bar:nth-child(4) { animation-delay: .3s; }
  .wave-bar:nth-child(5) { animation-delay: .4s; }
  @keyframes wave {
    0%,100% { height: 4px; }
    50% { height: 14px; }
  }
 
  footer {
    text-align: center;
    padding: 1.5rem;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 2px;
    border-top: 1px solid var(--border);
  }
 
  @media (max-width: 500px) {
    .pads-grid { gap: 5px; }
    .pad { height: 52px; }
    .knobs-row { gap: 12px; }
    .knob { width: 40px; height: 40px; }
    .sound-form { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
 
<header>
  <div class="logo">PO<span>-</span>WEB</div>
  <div class="header-right">
    <div class="rec-indicator" id="rec-dot"></div>
    <div class="header-tag">POCKET OPERATOR • FREE • NO ADS</div>
  </div>
</header>
 
<main>
  <div class="tabs" id="tabs"></div>
  <div id="device-container"></div>
 
  <!-- MEMO VOCALI -->
  <div class="memo-section">
    <div class="memo-title">◉ MEMO VOCALI / REGISTRAZIONI</div>
    <div class="memo-row">
      <button class="btn audio-rec" id="btn-audio-rec" onclick="toggleAudioRec()">◉ REC AUDIO</button>
      <button class="btn" onclick="exportAllMemos()">↓ SCARICA TUTTO</button>
      <span id="rec-timer" style="font-family:var(--font-mono);font-size:11px;color:var(--accent3);display:none"></span>
    </div>
    <div class="memo-list" id="memo-list"></div>
  </div>
</main>
 
<footer>PO-WEB v2.0 — open source — nessuna pubblicità — nessun account</footer>
 
<script>
// ═══════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════
const AC = window.AudioContext || window.webkitAudioContext;
let ctx = null, masterGain = null, filterNode = null;
let reverbMix = null, delayMix = null, delayFb = null, distNode = null, distGain = null;
 
function getCtx() {
  if (!ctx) {
    ctx = new AC();
    masterGain = ctx.createGain(); masterGain.gain.value = 0.8;
    filterNode = ctx.createBiquadFilter(); filterNode.type = 'lowpass'; filterNode.frequency.value = 20000;
 
    // Reverb
    const rLen = ctx.sampleRate * 2;
    const rBuf = ctx.createBuffer(2, rLen, ctx.sampleRate);
    for (let c = 0; c < 2; c++) { const d = rBuf.getChannelData(c); for (let i = 0; i < rLen; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/rLen,3); }
    const rv = ctx.createConvolver(); rv.buffer = rBuf;
    reverbMix = ctx.createGain(); reverbMix.gain.value = 0;
 
    // Delay
    const dl = ctx.createDelay(1); dl.delayTime.value = 0.3;
    delayFb = ctx.createGain(); delayFb.gain.value = 0;
    delayMix = ctx.createGain(); delayMix.gain.value = 0;
 
    // Distortion
    distNode = ctx.createWaveShaper();
    distNode.curve = makeDistCurve(0);
    distGain = ctx.createGain(); distGain.gain.value = 1;
 
    masterGain.connect(filterNode);
    filterNode.connect(ctx.destination);
    filterNode.connect(rv); rv.connect(reverbMix); reverbMix.connect(ctx.destination);
    filterNode.connect(dl); dl.connect(delayFb); delayFb.connect(dl);
    dl.connect(delayMix); delayMix.connect(ctx.destination);
    ctx._reverb = rv; ctx._delay = dl;
  }
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}
 
function makeDistCurve(amount) {
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = amount ? ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x)) : x;
  }
  return curve;
}
 
function out(node) { node.connect(masterGain); }
 
// ── Synth helpers ──
function makeDrum(freq, dur, noiseAmt, attack) {
  const c = getCtx(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(20, t + dur);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.8, t + attack);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); out(g); o.start(t); o.stop(t + dur);
  if (noiseAmt > 0) {
    const nb = c.createBuffer(1, c.sampleRate * 0.08, c.sampleRate);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1)*noiseAmt;
    const ns = c.createBufferSource(), ng = c.createGain(); ns.buffer = nb;
    ng.gain.setValueAtTime(0.3, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    ns.connect(ng); out(ng); ns.start(t);
  }
}
function makeHH(dur) {
  const c = getCtx(), t = c.currentTime;
  const nb = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
  const nd = nb.getChannelData(0); for (let i = 0; i < nd.length; i++) nd[i] = Math.random()*2-1;
  const s = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 8000;
  g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.buffer = nb; s.connect(f); f.connect(g); out(g); s.start(t);
}
function makeClap() {
  const c = getCtx(), t = c.currentTime;
  [0, 0.01, 0.02].forEach(dt => {
    const nb = c.createBuffer(1, c.sampleRate*0.05, c.sampleRate);
    const nd = nb.getChannelData(0); for (let i = 0; i < nd.length; i++) nd[i] = Math.random()*2-1;
    const s = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 1200; f.Q.value = 0.5;
    g.gain.setValueAtTime(0.4, t+dt); g.gain.exponentialRampToValueAtTime(0.001, t+dt+0.08);
    s.buffer = nb; s.connect(f); f.connect(g); out(g); s.start(t+dt);
  });
}
function makeTom(freq) {
  const c = getCtx(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.frequency.setValueAtTime(freq, t); o.frequency.exponentialRampToValueAtTime(30, t+0.3);
  g.gain.setValueAtTime(0.6, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.3);
  o.connect(g); out(g); o.start(t); o.stop(t+0.3);
}
function makeSynth(freq, wave='sawtooth') {
  const c = getCtx(), t = c.currentTime;
  const rel = 0.1 + state.release * 1.2;
  const o = c.createOscillator(), o2 = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
  o.type = wave; o.frequency.value = freq;
  o2.type = wave; o2.frequency.value = freq * 1.005;
  f.type = 'lowpass'; f.frequency.value = state.filterFreq; f.Q.value = 4;
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.25, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t+rel);
  o.connect(f); o2.connect(f); f.connect(g); out(g);
  o.start(t); o2.start(t); o.stop(t+rel); o2.stop(t+rel);
}
function makeBass(freq) {
  const c = getCtx(), t = c.currentTime;
  const rel = 0.1 + state.release * 1.4;
  const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
  o.type = 'sawtooth'; o.frequency.value = freq;
  f.type = 'lowpass'; f.frequency.value = Math.min(state.filterFreq, 700);
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.5, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t+rel);
  o.connect(f); f.connect(g); out(g); o.start(t); o.stop(t+rel);
}
function makeChord(freqs) {
  const c = getCtx(), t = c.currentTime;
  const rel = 0.3 + state.release * 2;
  freqs.forEach(freq => {
    const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
    o.type = 'sawtooth'; o.frequency.value = freq;
    f.type = 'lowpass'; f.frequency.value = state.filterFreq;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.1, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+rel);
    o.connect(f); f.connect(g); out(g); o.start(t); o.stop(t+rel);
  });
}
function makeArp(freqs) {
  const c = getCtx();
  freqs.forEach((freq, i) => {
    const t = c.currentTime + i * 0.11;
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
    o.connect(g); out(g); o.start(t); o.stop(t+0.1);
  });
}
function makeZap() {
  const c = getCtx(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(2000,t); o.frequency.exponentialRampToValueAtTime(80,t+0.25);
  g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  o.connect(g); out(g); o.start(t); o.stop(t+0.25);
}
function makePew() {
  const c = getCtx(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type='sine'; o.frequency.setValueAtTime(1500,t); o.frequency.exponentialRampToValueAtTime(200,t+0.3);
  g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o.connect(g); out(g); o.start(t); o.stop(t+0.3);
}
function makeBip(f) {
  const c = getCtx(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain();
  o.type='square'; o.frequency.value=f;
  g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  o.connect(g); out(g); o.start(t); o.stop(t+0.1);
}
function makeCustom(s) {
  const c = getCtx(), t = c.currentTime;
  const o = c.createOscillator(), g = c.createGain(), f = c.createBiquadFilter();
  o.type = s.wave || 'sine'; o.frequency.value = s.freq || 440;
  if (s.sweep) o.frequency.exponentialRampToValueAtTime(s.sweep, t + (s.dur||0.3));
  f.type = 'lowpass'; f.frequency.value = s.filter || 5000;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.4, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t+(s.dur||0.3));
  o.connect(f); f.connect(g); out(g); o.start(t); o.stop(t+(s.dur||0.3));
}

// ═══════════════════════════════════════════════
//  SEQUENCER
// ═══════════════════════════════════════════════
function getStepMs() { return (60 / state.bpm / 4) * 1000; }
 
function startSeq() {
  state.playing = true;
  state.currentStep = 0;
  function tick() {
    const dev = DEVICES[state.activeDevice];
    const seq = state.sequences[dev.id];
    seq.forEach((row, ri) => { if (row && row[state.currentStep]) dev.pads[ri]?.fn(); });
    updateSteps();
    state.currentStep = (state.currentStep + 1) % state.numSteps;
  }
  tick();
  state.intervalId = setInterval(tick, getStepMs());
  updateScreen(); updateBtnRow();
}
 
function stopSeq() {
  state.playing = false;
  clearInterval(state.intervalId);
  state.intervalId = null;
  state.currentStep = 0;
  updateSteps();
  updateScreen(); updateBtnRow();
}

function updateScreen() {
  const bpmEl = document.querySelector('.screen-bpm');
  if (bpmEl) bpmEl.textContent = state.bpm + ' BPM';
  document.querySelectorAll('.screen-info').forEach(el => {
    if (el.dataset.k === 'play') { el.textContent = state.playing ? 'PLAY' : 'STOP'; el.className = 'screen-info' + (state.playing ? ' on' : ''); }
    if (el.dataset.k === 'rec')  { el.textContent = state.rec ? 'REC' : '---'; el.className = 'screen-info' + (state.rec ? ' rec-on' : ''); }
    if (el.dataset.k === 'step') el.textContent = 'ST ' + String(state.currentStep+1).padStart(2,'0') + '/' + state.numSteps;
    if (el.dataset.k === 'fx')   el.textContent = 'FX:' + (state.fx.reverb?'R':'-') + (state.fx.delay?'D':'-');
  });
}
 
function updateSteps() {
  const dev = DEVICES[state.activeDevice];
  const seq = state.sequences[dev.id];
  document.querySelectorAll('.step-track').forEach((row, ri) => {
    row.querySelectorAll('.step').forEach((s, si) => {
      s.className = 'step' + (seq[ri] && seq[ri][si] ? ' on' : '') + (state.playing && si === state.currentStep ? ' current' : '');
    });

}
 
function updateBtnRow() {

// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════
function switchDevice(i) { state.activeDevice = i; renderTabs(); renderDevice(); }
 
function triggerPad(i) {
  getCtx();
  const dev = DEVICES[state.activeDevice];
  dev.pads[i]?.fn();
  const el = document.getElementById('pad-' + i);
  if (el) { el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 120); }
  if (state.rec) {
    const seq = state.sequences[dev.id];
    const step = state.playing ? state.currentStep : Math.floor(Math.random() * state.numSteps);
    if (!seq[i]) seq[i] = Array(state.numSteps).fill(false);
    seq[i][step] = !seq[i][step];
    updateSteps();
  }
}
 
function toggleStep(ri, si) {
  const dev = DEVICES[state.activeDevice];
  if (!state.sequences[dev.id][ri]) state.sequences[dev.id][ri] = Array(state.numSteps).fill(false);
  state.sequences[dev.id][ri][si] = !state.sequences[dev.id][ri][si];
  updateSteps();
}
 
function togglePlay() { if (state.playing) stopSeq(); else startSeq(); }
 
function toggleRec() { state.rec = !state.rec; updateScreen(); updateBtnRow(); }
 
function clearSeq() {
  const dev = DEVICES[state.activeDevice];
  state.sequences[dev.id] = Array(8).fill(null).map(() => Array(state.numSteps).fill(false));
  updateSteps();
}
 
function changeBpm(v) {
  state.bpm = parseInt(v);
  const el = document.getElementById('tempo-val');
  if (el) el.textContent = state.bpm + ' BPM';
  updateScreen();
  if (state.playing) {
    clearInterval(state.intervalId);
    state.intervalId = setInterval(() => {
      const dev = DEVICES[state.activeDevice];
      const seq = state.sequences[dev.id];
      seq.forEach((row, ri) => { if (row && row[state.currentStep]) dev.pads[ri]?.fn(); });
      updateSteps();
      state.currentStep = (state.currentStep + 1) % state.numSteps;
    }, getStepMs());
  }
}
 
function changeSteps(n) {
  const newN = parseInt(n);
  const dev = DEVICES[state.activeDevice];
  state.numSteps = newN;
  // resize sequences
  DEVICES.forEach(d => {
    state.sequences[d.id] = state.sequences[d.id].map(row => {
      if (!row) return Array(newN).fill(false);
      const newRow = Array(newN).fill(false);
      for (let i = 0; i < Math.min(row.length, newN); i++) newRow[i] = row[i];
      return newRow;
    });
  });
  if (state.currentStep >= newN) state.currentStep = 0;
  renderDevice();
}
 
function toggleFx(fx) {
  state.fx[fx] = !state.fx[fx];
  getCtx();
  if (reverbMix) reverbMix.gain.value = state.fx.reverb ? 0.35 : 0;
  if (delayMix)  delayMix.gain.value  = state.fx.delay  ? 0.4  : 0;
  if (delayFb)   delayFb.gain.value   = state.fx.delay  ? 0.35 : 0;
  renderDevice();
}
 
function addCustomSound() {
  const name = (document.getElementById('cs-name').value || 'SND').toUpperCase().slice(0,6);
  const wave = document.getElementById('cs-wave').value;
  const freq = parseFloat(document.getElementById('cs-freq').value) || 440;
  const sweep = parseFloat(document.getElementById('cs-sweep').value) || null;
  const dur = parseFloat(document.getElementById('cs-dur').value) || 0.3;
  const filter = parseFloat(document.getElementById('cs-filter').value) || 5000;
  const s = { wave, freq, sweep, dur, filter };
  const customDev = DEVICES.find(d => d.id === 'custom');
  customDev.pads.push({ n: name, fn: () => makeCustom(s) });
  if (!state.sequences['custom']) state.sequences['custom'] = [];
  state.sequences['custom'].push(Array(state.numSteps).fill(false));
  state.showAdd = false;
  state.activeDevice = DEVICES.findIndex(d => d.id === 'custom');
  renderTabs(); renderDevice();
}
 
// ═══════════════════════════════════════════════
//  KNOBS
// ═══════════════════════════════════════════════
let knobDrag = null;
function startKnob(e, id) {
  knobDrag = { id, startY: e.clientY, startVal: getKV(id) };
  const move = e => { if (!knobDrag) return; applyKD(knobDrag.id, knobDrag.startY - e.clientY, knobDrag.startVal); };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', () => { knobDrag = null; document.removeEventListener('mousemove', move); }, { once: true });
}
function startKnobT(e, id) {
  e.preventDefault();
  const t0 = e.touches[0];
  knobDrag = { id, startY: t0.clientY, startVal: getKV(id) };
  const move = e => { if (!knobDrag) return; applyKD(knobDrag.id, knobDrag.startY - e.touches[0].clientY, knobDrag.startVal); };
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', () => { knobDrag = null; document.removeEventListener('touchmove', move); }, { once: true });
}
function getKV(id) {
  if (id === 'vol') return state.volume;
  if (id === 'fil') return state.filterFreq / 20000;
  if (id === 'rel') return state.release;
  return 0.5;
}
function applyKD(id, dy, startVal) {
  const v = Math.max(0, Math.min(1, startVal + dy / 160));
  if (id === 'vol') { state.volume = v; if (masterGain) masterGain.gain.value = v; const el = document.getElementById('kval-vol'); if (el) el.textContent = Math.round(v*100) + '%'; }
  if (id === 'fil') { state.filterFreq = 200 + v * 19800; if (filterNode) filterNode.frequency.value = state.filterFreq; const el = document.getElementById('kval-fil'); if (el) el.textContent = Math.round(state.filterFreq/100)/10 + 'k'; }
  if (id === 'rel') { state.release = v; const el = document.getElementById('kval-rel'); if (el) el.textContent = v.toFixed(1) + 's'; }
  const dot = document.querySelector(`[data-knob="${id}"] .knob-dot`);
  if (dot) dot.style.transform = `rotate(${-135 + v*270}deg)`;
}
 
// ═══════════════════════════════════════════════
//  AUDIO RECORDING (memo vocali)
// ═══════════════════════════════════════════════
let mediaRecorder = null;
let audioChunks = [];
let recStartTime = null;
let recTimerInterval = null;
let memos = [];
 
async function toggleAudioRec() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    // Registra sia il microfono sia il contesto audio via AudioContext destination stream
    const dest = getCtx().createMediaStreamDestination();
    masterGain.connect(dest);
    const stream = dest.stream;
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    recStartTime = Date.now();
 
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      clearInterval(recTimerInterval);
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const duration = ((Date.now() - recStartTime) / 1000).toFixed(1);
      const name = 'memo-' + new Date().toISOString().slice(11,19).replace(/:/g,'-');
      memos.push({ name, blob, duration, size: (blob.size / 1024).toFixed(0) });
      document.getElementById('btn-audio-rec').classList.remove('active');
      document.getElementById('rec-dot').classList.remove('active');
      document.getElementById('rec-timer').style.display = 'none';
      masterGain.disconnect(dest);
      renderMemos();
    };
 
    mediaRecorder.start();
    document.getElementById('btn-audio-rec').classList.add('active');
    document.getElementById('btn-audio-rec').textContent = '■ STOP REC';
    document.getElementById('rec-dot').classList.add('active');
    const timerEl = document.getElementById('rec-timer');
    timerEl.style.display = 'inline';
    recTimerInterval = setInterval(() => {
      const s = ((Date.now() - recStartTime) / 1000).toFixed(0);
      timerEl.textContent = '● ' + String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    }, 500);
  } catch (err) {
    alert('Impossibile accedere all\'audio: ' + err.message);
  }
}
 
function renderMemos() {
  const list = document.getElementById('memo-list');
  if (!memos.length) { list.innerHTML = '<div style="font-family:var(--font-mono);font-size:10px;color:var(--text2);padding:.5rem 0">Nessuna registrazione ancora.</div>'; return; }
  list.innerHTML = memos.map((m, i) => `
    <div class="memo-item">
      <div class="memo-name">${m.name}.webm</div>
      <div class="memo-size">${m.duration}s · ${m.size}KB</div>
      <button class="btn-sm" onclick="playMemo(${i})">▶</button>
      <button class="btn-sm" onclick="downloadMemo(${i})">↓</button>
      <button class="btn-sm danger" onclick="deleteMemo(${i})">✕</button>
    </div>`).join('');
}
 
function playMemo(i) {
  const url = URL.createObjectURL(memos[i].blob);
  const a = new Audio(url); a.play();
}
function downloadMemo(i) {
  const url = URL.createObjectURL(memos[i].blob);
  const a = document.createElement('a'); a.href = url; a.download = memos[i].name + '.webm'; a.click();
}
function deleteMemo(i) { memos.splice(i, 1); renderMemos(); }
function exportAllMemos() {
  memos.forEach((m, i) => setTimeout(() => downloadMemo(i), i * 500));
}
 
// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderTabs();
renderDevice();
renderMemos();
document.getElementById('btn-audio-rec').textContent = '◉ REC AUDIO';
</script>
