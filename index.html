<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintetizzatore Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-color: #0a0e14;
            --panel-color: #1a222d;
            --accent-color: #4fc3f7;
            --text-color: #e0e6ed;
            --pad-color: #81d4fa;
            --pad-active: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Il contenitore principale ora è pulito senza header */
        .synth-container {
            background-color: var(--panel-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
            border: 1px solid #2d3d50;
            margin-top: 50px;
        }

        .display {
            background-color: #0d1117;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--accent-color);
        }

        .bpm-display {
            font-size: 24px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .pads-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .pad {
            background-color: var(--pad-color);
            height: 80px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
            border: none;
            color: #1a222d;
        }

        .pad:active, .pad.active {
            background-color: var(--pad-active);
            box-shadow: 0 0 20px var(--pad-active);
            transform: scale(0.95);
        }

        .pad-label { font-weight: bold; font-size: 18px; }
        .pad-sub { font-size: 10px; opacity: 0.7; }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background-color: #2d3d50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
        }

        button.play-btn { background-color: #2e7d32; }
        button.stop-btn { background-color: #c62828; }

        input[type=range] {
            width: 200px;
            accent-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="synth-container">
        <div class="display">
            <div id="status">READY</div>
            <div class="bpm-display"><span id="bpm-val">120</span> BPM</div>
        </div>

        <div class="pads-grid">
            <button class="pad" data-note="C2"><span class="pad-label">BD</span><span class="pad-sub">kick</span></button>
            <button class="pad" data-note="D2"><span class="pad-label">SD</span><span class="pad-sub">snare</span></button>
            <button class="pad" data-note="F#2"><span class="pad-label">HH</span><span class="pad-sub">closed</span></button>
            <button class="pad" data-note="A#2"><span class="pad-label">OH</span><span class="pad-sub">open</span></button>
            <button class="pad" data-note="G2"><span class="pad-label">CL</span><span class="pad-sub">clap</span></button>
            <button class="pad" data-note="C3"><span class="pad-label">TM</span><span class="pad-sub">hi tom</span></button>
            <button class="pad" data-note="A2"><span class="pad-label">TM</span><span class="pad-sub">lo tom</span></button>
            <button class="pad" data-note="C#3"><span class="pad-label">CY</span><span class="pad-sub">cymbal</span></button>
        </div>

        <div class="controls">
            <button id="start-stop" class="play-btn">Play</button>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <label>TEMPO</label>
                <input type="range" id="bpm" min="60" max="200" value="120">
            </div>
        </div>
    </div>

    <script>
        // Caricamento suoni base
        const kit = new Tone.Sampler({
            urls: {
                C2: "https://tonejs.github.io/audio/drum-samples/CR78/kick.mp3",
                D2: "https://tonejs.github.io/audio/drum-samples/CR78/snare.mp3",
                "F#2": "https://tonejs.github.io/audio/drum-samples/CR78/hihat.mp3",
                "A#2": "https://tonejs.github.io/audio/drum-samples/CR78/openhihat.mp3",
                G2: "https://tonejs.github.io/audio/drum-samples/CR78/clap.mp3",
                C3: "https://tonejs.github.io/audio/drum-samples/CR78/tom1.mp3",
                A2: "https://tonejs.github.io/audio/drum-samples/CR78/tom2.mp3",
                "C#3": "https://tonejs.github.io/audio/drum-samples/CR78/cowbell.mp3",
            },
            release: 1
        }).toDestination();

        // Controlli pad
        document.querySelectorAll('.pad').forEach(pad => {
            pad.addEventListener('mousedown', () => {
                const note = pad.getAttribute('data-note');
                kit.triggerAttackRelease(note, "8n");
                pad.classList.add('active');
                setTimeout(() => pad.classList.remove('active'), 100);
            });
        });

        // Gestione BPM
        const bpmSlider = document.getElementById('bpm');
        const bpmVal = document.getElementById('bpm-val');
        bpmSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            Tone.Transport.bpm.value = val;
            bpmVal.innerText = val;
        });

        // Start/Stop
        const playBtn = document.getElementById('start-stop');
        let playing = false;

        playBtn.addEventListener('click', async () => {
            await Tone.start();
            if (!playing) {
                Tone.Transport.start();
                playBtn.innerText = "Stop";
                playBtn.className = "stop-btn";
                playing = true;
            } else {
                Tone.Transport.stop();
                playBtn.innerText = "Play";
                playBtn.className = "play-btn";
                playing = false;
            }
        });
    </script>
</body>
</html>
